<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>memlay</title>
<style>
  :root { --bg: #0d0d0d; --fg: #e8e8e8; --accent: #7c3aed; --muted: #888; --border: #222; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font: 16px/1.6 system-ui, sans-serif;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  main { max-width: 520px; width: 100%; padding: 2rem 1.5rem; }
  h1 { font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: .25rem; }
  .tagline { color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
  .pill { display: inline-block; background: var(--border); border-radius: 999px;
           padding: .15rem .7rem; font-size: .8rem; color: var(--muted); margin-right: .3rem; }
  section { border: 1px solid var(--border); border-radius: .5rem; padding: 1.25rem 1.5rem;
            margin-bottom: 1rem; }
  section h2 { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em;
               color: var(--muted); margin-bottom: .75rem; }
  code { background: var(--border); border-radius: .25rem; padding: .1rem .4rem;
         font-size: .9rem; font-family: ui-monospace, monospace; color: var(--fg); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .row { display: flex; justify-content: space-between; align-items: center;
         padding: .35rem 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
  .row:last-child { border-bottom: none; }
  .row span:first-child { color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>memlay</h1>
  <p class="tagline">High-performance in-memory Nostr relay</p>

  <section>
    <h2>Connect</h2>
    <div class="row">
      <span>WebSocket</span>
      <code id="ws-url"></code>
    </div>
    <div class="row">
      <span>NIPs</span>
      <span><span class="pill">NIP-01</span><span class="pill">NIP-11</span></span>
    </div>
  </section>

  <section>
    <h2>Store</h2>
    <div class="row"><span>Events</span><span id="stat-events">—</span></div>
    <div class="row"><span>Memory Used</span><span id="stat-bytes">—</span></div>
    <div class="row"><span>Capacity</span><span id="stat-capacity">—</span></div>
  </section>

  {{METRICS_SECTION}}

  <section>
    <h2>Info</h2>
    <div class="row"><span>Software</span>
      <a href="https://github.com/v0l/memlay">github.com/v0l/memlay</a></div>
    <div class="row"><span>Version</span><code>{{VERSION}}</code></div>
  </section>
</main>
<script>
  const u = location.href.replace(/^http/, 'ws').replace(/\/$/, '');
  document.getElementById('ws-url').textContent = u;

  function fmt(n) { return n.toLocaleString(); }
  function fmtBytes(b) {
    if (b === 0) return '0 B';
    const units = ['B','KB','MB','GB'];
    let i = 0;
    while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
    return b.toFixed(1) + ' ' + units[i];
  }

  function fmtCapacity(bytes, limit) {
    if (!limit || limit === 0) return '—';  // unlimited
    return Math.round(bytes / limit * 100) + '%';
  }

  async function refreshStats() {
    try {
      const s = await fetch('/stats').then(r => r.json());
      document.getElementById('stat-events').textContent = fmt(s.events);
      
      // Show actual process memory usage (RSS) vs memory limit
      const used = s.process_memory || s.store_bytes || 0;
      const max = s.max_bytes || 0;
      
      if (max > 0) {
        document.getElementById('stat-bytes').textContent = fmtBytes(used) + ' / ' + fmtBytes(max);
      } else {
        document.getElementById('stat-bytes').textContent = fmtBytes(used);
      }
      
      // Capacity percentage (process memory vs limit)
      document.getElementById('stat-capacity').textContent = fmtCapacity(s.process_memory || 0, s.max_bytes);
    } catch (_) {}
  }

  refreshStats();
  setInterval(refreshStats, 2000);
</script>
</body>
</html>
